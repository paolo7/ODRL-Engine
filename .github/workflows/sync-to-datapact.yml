name: Sync to DATAPACT repository

on:
  push:
    branches:
      - main

concurrency:
  group: sync-main-to-datapact
  cancel-in-progress: false

jobs:
  sync:
    if: github.repository == 'DIPS-Tools/ODRL-Engine'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify token exists
        env:
          TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          test -n "$TOKEN"

      - name: Verify access to target repo
        env:
          TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          git ls-remote \
            https://oauth2:${TOKEN}@github.com/DATAPACT/ODRL-Engine.git

      - name: Push to target
        env:
          TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          git remote add target \
            https://oauth2:${TOKEN}@github.com/DATAPACT/ODRL-Engine.git

          git push target main:main --force-with-lease