name: Sync to DATAPACT repository

on:
  push:
    branches:
      - main

concurrency:
  group: sync-main-to-datapact
  cancel-in-progress: false

jobs:
  sync:
    if: github.repository == 'DIPS-Tools/ODRL-Engine'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify token exists
        env:
          TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "SYNC_TOKEN missing"
            exit 1
          fi
          echo "Token exists"

      - name: Push to DATAPACT
        env:
          TOKEN: ${{ secrets.SYNC_TOKEN }}
        run: |
          set -euo pipefail

          # Remove any credentials injected by checkout
          git config --unset-all http.https://github.com/.extraheader || true

          # Add target remote using PAT
          git remote remove target || true
          git remote add target \
            https://x-access-token:${TOKEN}@github.com/DATAPACT/ODRL-Engine.git

          # sanity check (will fail fast if auth broken)
          git ls-remote target

          # push
          git push target HEAD:main --force-with-lease